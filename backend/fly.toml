app = "your-app-name"
primary_region = "ams" # Or your closest region

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false # Keep it alive for the WhatsApp bot
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb" # Puppeteer/Chrome needs at least 1GB to run smoothly